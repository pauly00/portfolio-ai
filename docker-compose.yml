version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: portfolio-qdrant
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC (Spring AI가 사용)
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qdrant_data:
